name: Auto-merge safe PRs

# Auto-aprova e mergeia PRs cujo Security Gate passou.
# Espelha o auto-merge do PrimeTeam: o evento workflow_run é a fonte
# canônica de verdade — quando o Security Gate completa com sucesso,
# fazemos approve + squash merge. Aprovação manual também dispara o
# fluxo, mas re-verifica o status via checks API.

on:
  workflow_run:
    workflows: ["Security Gate"]
    types: [completed]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Apenas PRs internos (mesma org/repo). Forks não disparam auto-merge
    # — eles entram pelo fluxo manual de review.
    if: ${{ github.event_name == 'workflow_run' || github.event.pull_request.author_association == 'OWNER' || github.event.pull_request.author_association == 'MEMBER' || github.event.pull_request.author_association == 'COLLABORATOR' }}
    steps:
      - name: Auto-merge if security gate passed
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            let pr;
            let securityValidated = false;

            if (context.eventName === 'pull_request_review') {
              pr = context.payload.pull_request;
              // Approval manual: re-verificamos o security gate via checks API.
            } else if (context.eventName === 'workflow_run') {
              const run = context.payload.workflow_run;
              if (!run || run.conclusion !== 'success') {
                console.log('Security Gate did not succeed — skipping');
                return;
              }
              if (run.pull_requests && run.pull_requests.length > 0) {
                pr = run.pull_requests[0];
              }
              securityValidated = true;
            }

            if (!pr) {
              console.log('No PR found in event — skipping');
              return;
            }

            const prNumber = pr.number;

            // Fluxo manual de approval: confirmar que o security gate rodou
            // e passou no commit atual antes de mergear.
            if (!securityValidated) {
              const { data: checks } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head_sha || pr.head?.sha,
              });

              const securityCheck = checks.check_runs.find(c => c.name === 'security-check');

              if (!securityCheck) {
                console.log('Security gate not yet run on this commit — skipping');
                return;
              }

              if (securityCheck.conclusion !== 'success') {
                console.log(`Security gate status: ${securityCheck.conclusion} — NOT auto-merging`);
                console.log('This PR requires manual review by an admin.');
                return;
              }
            }

            console.log('Security gate PASSED — auto-merging PR #' + prNumber);

            // Auto-aprova com bot account.
            try {
              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                event: 'APPROVE',
                body: 'Security gate passed. Auto-approved.',
              });
            } catch (e) {
              console.log('Could not auto-approve (might be self-PR): ' + e.message);
            }

            // Squash merge.
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash',
              });
              console.log('PR #' + prNumber + ' merged successfully');
            } catch (e) {
              console.log('Could not merge: ' + e.message);
            }
