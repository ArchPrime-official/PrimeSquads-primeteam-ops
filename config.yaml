# ═══════════════════════════════════════════════════════════════════════════════
# primeteam-ops — Squad Configuration
# ═══════════════════════════════════════════════════════════════════════════════

pack:
  name: primeteam-ops
  version: 1.5.0
  description: >
    ROOT SQUAD da PrimeTeam — Master orchestration layer + execution layer.
    CLI binary `pto` é o entry point único da plataforma (Google OAuth + JWT).
    ops-chief é o master orchestrator que conhece os 4 sub-squads operacionais
    e roteia demandas para sub-chiefs apropriados via cross-squad handoff.

    v1.3.0 base (Waves 4-8, 2026-05-10): 80 tasks cobrindo ~100% dos fluxos
    manuais da plataforma + 2 workflows formais de aprovação. Authorization
    model enforced: has_finance_access (owner+financeiro, admin EXCLUDED),
    has_invoice_access (owner+admin), hierarchy owner > admin = financeiro >
    comercial = cs = marketing.

    v1.4.0 hierarchy refactor (2026-05-14): primeteam-ops declarado ROOT SQUAD.
    ops-chief vira master orchestrator com sub_chief_routing. Cross-squad
    workflows ficam first-class em workflows/cross-squad/. Activity log unified
    via parent_squad + sub_squad metadata.
  icon: "⚙️"
  slash_prefix: PrimeteamOps

# ═══════════════════════════════════════════════════════════════════════════════
# HIERARCHY (v1.4.0 — root squad declaration)
# ═══════════════════════════════════════════════════════════════════════════════
hierarchy:
  role: root_squad                    # 1 root_squad existe na PrimeTeam
  cli_binary: pto                     # entry point físico do hub
  master_orchestrator: "@ops-chief"   # único orchestrator que conhece sub-chiefs

  sub_squads:
    - name: creative-studio
      sub_chief: "@creative-chief"
      domain: "Geração de criativos (carosello, video, immagine, marketing studio)"
      slash_prefix: creativeStudio
      handles:
        - "criar carosello"
        - "criar video AI"
        - "criar immagine"
        - "marketing studio (Higgsfield NO PEOPLE)"
        - "podcast clip simulado"
        - "batch ads A/B testing"
        - "trend reativo veloce"
      reports_to: "@ops-chief"

    - name: strategic-management
      sub_chief: "@strategy-chief"
      domain: "Diagnóstico estratégico + board meeting + financial analysis"
      slash_prefix: stratMgmt
      handles:
        - "diagnóstico estratégico"
        - "board meeting"
        - "financial analysis"
        - "growth strategy"
        - "moonshot analysis"
      reports_to: "@ops-chief"

    - name: meta-ads
      sub_chief: "@meta-ads-chief"
      domain: "Paid acquisition Meta (audit, launch, scale, optimize)"
      slash_prefix: metaAds
      handles:
        - "audit campanhas Meta"
        - "launch campaign"
        - "campaign scaling"
        - "budget optimization"
        - "creative analysis (performance)"
      reports_to: "@ops-chief"

    - name: primeteam-improve
      sub_chief: "@pt-chief"
      domain: "Melhorias da plataforma PrimeTeam (frontend, data, integrations, design)"
      slash_prefix: ptImprove
      handles:
        - "design audit/improvements"
        - "frontend refactors"
        - "data architecture changes"
        - "integration debugging"
        - "QA platform issues"
      reports_to: "@ops-chief"

  meta_squads:
    # Squads tooling/meta — não são sub-squads operacionais
    - name: squad-creator
      role: meta_squad
      purpose: "Cria/audita/valida outros squads. Não opera plataforma."
      slash_prefix: squadCreator

  design_resources:
    # Não-squads (pacotes/presets)
    - name: lovarch-design-system
      role: design_resource
      purpose: "Tailwind preset + tokens Lovarch. Importável via npm."

# ═══════════════════════════════════════════════════════════════════════════════
# CROSS-SQUAD ROUTING (v1.4.0)
# ═══════════════════════════════════════════════════════════════════════════════
cross_squad_routing:
  enabled: true
  protocol: "Cycle ID + handoff card (V18) + activity_log unified"
  workflows_folder: "workflows/cross-squad/"
  activity_log_strategy: "parent_squad='primeteam-ops' + sub_squad=<name> + cycle_id=<UUID>"

  examples:
    - name: "Carosello publish flow"
      flow: "ops-chief → creative-chief (gera) → ops-chief → content-builder (publish na plataforma)"
      workflow: "workflows/cross-squad/wf-creative-to-publish.yaml"

    - name: "Strategy → Creative brief"
      flow: "ops-chief → strategy-chief (board diagnostic) → ops-chief → creative-chief (briefa novo conteúdo)"
      workflow: "workflows/cross-squad/wf-strategy-to-creative.yaml (TODO)"

    - name: "Full launch cycle"
      flow: "ops-chief → strategy → creative → meta-ads → publish → track"
      workflow: "workflows/cross-squad/wf-full-launch-cycle.yaml (TODO)"

# ─────────────────────────────────────────────────────────────────────────────
# Agents registry (10 agents — v1.2.0)
# ─────────────────────────────────────────────────────────────────────────────
agents:
  - id: ops-chief
    file: agents/ops-chief.md
    tier: 0
    role: orchestrator
    description: >
      Hub único de orquestração. Recebe demandas, tria, roteia para specialists,
      valida output via handoff-quality-gate, decide próximo passo ou fecha ciclo.
      Conhece toda a plataforma (18 módulos, 226 tabelas, 195 Edge Functions,
      8 integrações). Todos specialists retornam para cá.

  - id: auth-specialist
    file: agents/auth-specialist.md
    tier: 1
    role: authentication
    description: >
      Google OAuth via browser-callback. Salva JWT em ~/.primeteam/session.json
      (chmod 600). Refresh token automático via maybeRefresh (Sprint 22).
      Commands expostos pelo CLI: pto login/logout/whoami/refresh.

  - id: platform-specialist
    file: agents/platform-specialist.md
    tier: 1
    role: execution
    description: >
      Executa CRUD de 3 módulos core: Tasks (todo list + eisenhower + project),
      Finance (transactions + recurring + invoices) e CS (students + tickets +
      onboarding). 9 playbooks CS + 6 Finance + 3 Tasks (~380L playbooks).

  - id: sales-specialist
    file: agents/sales-specialist.md
    tier: 2
    role: execution
    description: >
      Módulo Comercial — leads, opportunities, pipeline Kanban. 10 playbooks
      cobrindo criação, movimentação de stages, atribuição a campanhas e
      consolidação de contato multi-canal (email + phone + WhatsApp).

  - id: content-builder
    file: agents/content-builder.md
    tier: 2
    role: execution
    description: >
      Landing Pages via templates self-contained HTML. Valida slug uniqueness,
      sempre cria com active=false (sandbox). 10 playbooks. NÃO escreve copy
      autoral — consulta /videoCreative ou /metaAds para isso.

  - id: automation-specialist
    file: agents/automation-specialist.md
    tier: 2
    role: execution
    description: >
      Flows de automação + email templates. Sprint 15 autorizou edit de
      nodes/edges em flows inativos. Flows ativos: deactivate ou clone primeiro.

  - id: integration-specialist
    file: agents/integration-specialist.md
    tier: 3
    role: external_boundary
    description: >
      4 boundaries externas: Google Calendar (read + watch channel),
      Revolut (balances/tx — NUNCA transfers), Meta Ads (read + pause/resume/
      budget + A/B tests), Phone/VAPI (outbound AI calls). 25 playbooks,
      8 smoke tests. Revolut transferências PERMANENTEMENTE OUT (by design).

  - id: quality-guardian
    file: agents/quality-guardian.md
    tier: 3
    role: audit
    description: >
      Audit specialist — roda handoff-quality-gate a cada retorno ao chief.
      5 seções + 5 extensões (activity_log, external_mutation, cost, etc.).
      Verdicts: PASS / REJECT / ESCALATE / WAIVED com how_to_fix.

  - id: admin-specialist
    file: agents/admin-specialist.md
    tier: 3
    role: owner_only
    description: >
      OWNER-ONLY operations — grant/revoke roles, criar users, ver activity log
      completo. Failure mode STRICT em activity_logs (se log write falha, ABORT
      a mutation). Único specialist com escalation mandatório.

  - id: imports-specialist
    file: agents/imports-specialist.md
    tier: 3
    role: execution
    description: >
      Bulk import CSV — sempre dry-run mode primeiro (não grava nada),
      usuário aprova sample, depois commit. 1 entry em activity_logs por batch
      (não per-row). Aceita inputs de finance, leads, students.

# ─────────────────────────────────────────────────────────────────────────────
# Tasks registry (16 tasks HO-TP-001)
# Atualizado 2026-05-10: registradas 3 tasks CMS adicionadas em 2026-05-09
# (create-cms-page, list-cms-pages, publish-cms-page) — drift detectado em
# audit-2026-05-10 doc 02 (squad-current-state).
# ─────────────────────────────────────────────────────────────────────────────
tasks:
  - id: test-handoff-flow
    file: tasks/test-handoff-flow.md
    purpose: Smoke test da topologia hub-and-spoke (V20 obrigatório)

  - id: create-task
    file: tasks/create-task.md
    purpose: Criar tarefa no módulo Tasks (eisenhower + project assignment)
    agent: platform-specialist

  - id: list-tasks
    file: tasks/list-tasks.md
    purpose: Listar tarefas com filtros (urgent, project, status, due date)
    agent: platform-specialist

  - id: complete-task
    file: tasks/complete-task.md
    purpose: Marcar tarefa como completa + atualizar project rollup
    agent: platform-specialist

  - id: update-task
    file: tasks/update-task.md
    purpose: >
      UPDATE atomic em uma row de tasks com authorization pre-check do PRD F-08.3.
      Mudança de due_date por NÃO-creator, NÃO-owner dispara workflow F-08.3
      (REQUEST_CREATED). Demais campos (title/priority/urgency/status/tags) =
      UPDATE direto + audit em task_date_changes se due_date mudou.
    agent: platform-specialist

  - id: request-task-date-change
    file: tasks/request-task-date-change.md
    purpose: >
      Cria row em task_date_change_requests quando user NÃO autorizado pede
      mudança de due_date. Approver = task.created_by. Pre-check redireciona
      creator/owner para update-task (UPDATE direto). Implementa F-08.3.
    agent: platform-specialist

  - id: approve-task-date-change
    file: tasks/approve-task-date-change.md
    purpose: >
      Aprovar (UPDATE task + INSERT task_date_changes audit + UPDATE request)
      ou rejeitar (UPDATE request) uma task_date_change_requests pendente.
      Authorization restrita a approver_id (creator) ou owner. Race-safe via
      WHERE due_date = current_due_date guard.
    agent: platform-specialist

  - id: create-finance-transaction
    file: tasks/create-finance-transaction.md
    purpose: Lançar transação financeira (income/expense) com categoria
    agent: platform-specialist

  - id: create-lead
    file: tasks/create-lead.md
    purpose: Criar novo lead + atribuir campanha de origem
    agent: sales-specialist

  - id: move-opportunity-stage
    file: tasks/move-opportunity-stage.md
    purpose: Mover oportunidade no pipeline Kanban
    agent: sales-specialist

  - id: list-customers
    file: tasks/list-customers.md
    purpose: Listar customers (alunos no vocab UI, tabela `customers` no DB) com filtros (health/manager/onboarding) — renomeada 2026-05-10
    agent: platform-specialist

  - id: create-landing-page
    file: tasks/create-landing-page.md
    purpose: "[DEPRECATED 2026-05-10 — use create-cms-page] Spec pré-convergência cms_pages→landing_pages (PR #1226). Faltam target_domain/locale obrigatórios. Mantida só pra referência histórica."
    agent: content-builder
    deprecated: true
    superseded_by: create-cms-page

  - id: create-cms-page
    file: tasks/create-cms-page.md
    purpose: >
      Criar landing_page (alias semântico CMS — pós PR #1226 cms_pages
      consolidada em landing_pages, tabela única para 3 domínios)
    agent: content-builder

  - id: list-cms-pages
    file: tasks/list-cms-pages.md
    purpose: >
      Listar landing_pages com filtros (domain, locale, status, active,
      campanha) — read-only sem html_content payload
    agent: content-builder

  - id: publish-cms-page
    file: tasks/publish-cms-page.md
    purpose: >
      Toggle status entre 'draft'/'archived' e 'published' com webhook
      automático para revalidate (ISR em lovarch.com/archprime.io)
    agent: content-builder

  - id: list-automation-flows
    file: tasks/list-automation-flows.md
    purpose: Listar flows ativos/inativos com node count + template refs
    agent: automation-specialist

  - id: list-calendar-events
    file: tasks/list-calendar-events.md
    purpose: Read events do cache local com staleness check + trigger re-sync
    agent: integration-specialist

  - id: list-revolut-balances
    file: tasks/list-revolut-balances.md
    purpose: Read balances com discrepancy flagging + 15min staleness
    agent: integration-specialist

  - id: list-meta-campaigns
    file: tasks/list-meta-campaigns.md
    purpose: Read campanhas Meta com aggregates + underperformer flags
    agent: integration-specialist

  - id: run-meta-sync
    file: tasks/run-meta-sync.md
    purpose: >
      Invoca edge sync-meta-billing para refresh meta_ads_*_cache +
      insights_daily. Open op (marketing/comercial/admin/owner). Quota guard
      30s entre non-fast syncs. Detecta token expirado e redireciona para
      update-meta-sync-config (NÃO renova token). Confirmation obrigatório.
    agent: integration-specialist

  - id: update-meta-sync-config
    file: tasks/update-meta-sync-config.md
    purpose: >
      Token rotation, account_id swap, sync interval, toggle active em
      meta_ads_config. Admin/owner-only (gate primário admin-specialist).
      Dupla confirmation diferenciada (ROTACIONA/TROCA CONTA literal),
      tokens redacted em audit logs (hash SHA-256 + length), smoke test
      pós-rotation com rollback automático em 401.
    agent: admin-specialist  # gate primário (admin/owner-only)

  # ── Wave 6 Tier 1: 20 tasks adicionais cobrindo módulos 02/05/09/10/11/13/17 ──

  - id: create-event
    file: tasks/create-event.md
    purpose: >
      Criar evento (workshop/immersione/lancio/live) orquestrando LP draft +
      products fiscais (handoff admin) + email sequence. Marketing/owner.
      F-17.2 + F-17.6 PRD.
    agent: content-builder

  - id: launch-lancio-online
    file: tasks/launch-lancio-online.md
    purpose: >
      Wizard estruturado para Lancio Online (pré + carrinho + thank-you +
      upsell). Cria 4 LPs draft + 3 email sequences + 1 flow upsell.
      Marketing/owner. Tripla confirmation "CONFIRMA LANCIO". F-17.3 PRD.
    agent: content-builder

  - id: list-event-registrants
    file: tasks/list-event-registrants.md
    purpose: >
      Read-only inscritos de evento com filtros (status/presença/conversão).
      CS/marketing/admin/owner. Stats + conversion rate. F-17.5 PRD.
    agent: sales-specialist

  - id: update-event-status
    file: tasks/update-event-status.md
    purpose: >
      Atualizar status de inscrito (confirmed→attended→converted).
      State machine validation, cs/marketing/admin/owner. F-17.5 PRD.
    agent: sales-specialist

  - id: send-whatsapp-message
    file: tasks/send-whatsapp-message.md
    purpose: >
      Send WhatsApp via Business API. Comercial/cs/marketing/admin/owner.
      24h window enforcement (text fora = template only Meta policy).
      Quota guard 10/60s. Phone redaction em logs. F-11.1 PRD.
    agent: integration-specialist

  - id: launch-vapi-call
    file: tasks/launch-vapi-call.md
    purpose: >
      Disparar chamada AI Vapi. Comercial/admin/owner. Opt-out enforcement
      hard. Cool-down 24h. Cost estimate antes de confirmar. F-11.2 PRD.
    agent: integration-specialist

  - id: list-vapi-calls
    file: tasks/list-vapi-calls.md
    purpose: >
      Read-only listar chamadas Vapi com filtros (período/status/lead/cost).
      Comercial/cs/admin/owner. Stats + transcripts opt-in (payload pesado).
    agent: integration-specialist

  - id: create-sales-invoice
    file: tasks/create-sales-invoice.md
    purpose: >
      Emitir nota fiscal (sales_invoices) com número sequencial atomico
      (advisory lock). Admin/owner via has_invoice_access. Tripla confirm
      "EMITE NOTA". Imutável após criação. F-13.3 PRD.
    agent: admin-specialist

  - id: bulk-reissue-invoices
    file: tasks/bulk-reissue-invoices.md
    purpose: >
      Reemitir batch de NFEs (correções, refresh customer data). VOID old +
      INSERT new sequencial. Admin/owner. Tripla confirm "REISSUE BATCH".
      Reason obrigatório. Linkagem old↔new. F-13.4 PRD.
    agent: admin-specialist

  - id: sync-seller-commission
    file: tasks/sync-seller-commission.md
    purpose: >
      Calcular + persistir comissões de sellers para período mensal.
      Admin/owner via has_invoice_access. Dry_run default true (preview).
      Persist requer "PERSISTE COMISSÃO" literal. F-13.6 PRD.
    agent: platform-specialist

  - id: create-session-note
    file: tasks/create-session-note.md
    purpose: >
      INSERT em cs_session_notes (call/email/check-in summary + next steps).
      cs/admin/owner. FK integrity (opp/lead linka customer). F-05.2 PRD.
    agent: platform-specialist

  - id: create-onboarding-form
    file: tasks/create-onboarding-form.md
    purpose: >
      Criar template de formulário (NPS/satisfação/onboarding) em
      evaluation_forms. cs/marketing/admin/owner. Status starts draft —
      publish é task separada. F-05.3 PRD.
    agent: content-builder

  - id: publish-onboarding-form
    file: tasks/publish-onboarding-form.md
    purpose: >
      Toggle status form draft↔published. Após publish, form aceita
      submissões públicas. Optional notify customer via email. F-05.3 PRD.
    agent: content-builder

  - id: bulk-update-opportunities
    file: tasks/bulk-update-opportunities.md
    purpose: >
      Atualizar batch de opps (stage/owner/product/tags). Comercial/admin/
      owner. Reason obrigatório, max 200, tripla confirm "BULK UPDATE",
      atomic per-opp via SAVEPOINT. F-02.4 PRD.
    agent: sales-specialist

  - id: verify-opportunity
    file: tasks/verify-opportunity.md
    purpose: >
      Marcar opp como verified/duplicate/suspicious. Admin/owner only.
      duplicate exige merged_into_id. Reversível via 'unverify'. F-02.6 PRD.
    agent: sales-specialist

  - id: update-landing-page
    file: tasks/update-landing-page.md
    purpose: >
      UPDATE landing_pages (blocks/html_content/title/redirect/etc). NÃO
      publica. Conditional confirmation (published='UPDATE LIVE' uppercase,
      draft=simple). Lovarch warning se html_content em lovarch/archprime
      domain. Optimistic lock via version. F-09.1 PRD.
    agent: content-builder

  - id: generate-landing-page-ai
    file: tasks/generate-landing-page-ai.md
    purpose: >
      Disparar LLM-driven LP generation (brief → blocks JSON via edge
      landing-page-ai-generator). Marketing/admin/owner. Cost estimate.
      LP starts draft. F-09.2 PRD.
    agent: content-builder

  - id: create-automation-flow
    file: tasks/create-automation-flow.md
    purpose: >
      INSERT automation_flows (nodes/edges DAG). DAG validation (sem ciclos,
      trigger sem incoming). Status starts draft. AI flag opcional para
      tracking. F-10.1 PRD.
    agent: automation-specialist

  - id: activate-automation-flow
    file: tasks/activate-automation-flow.md
    purpose: >
      Toggle status draft/paused → active. Authority: creator OR owner.
      Tripla confirm "ATIVA FLOW". confirm_test_passed required (incentiva
      dry-run). Após ativação, trigger executa real ações. F-10.1 PRD.
    agent: automation-specialist

  - id: deactivate-automation-flow
    file: tasks/deactivate-automation-flow.md
    purpose: >
      Toggle status active → paused. Authority creator/owner. Pending
      executions preservadas (default) ou canceladas (cancel_pending=true).
      Reversible. F-10.1 PRD.
    agent: automation-specialist

  # ── Wave 7 Tier 1: 13 tasks UI-vs-CLI gaps (cobre ops diárias UI fazia/CLI não) ──

  - id: update-finance-transaction
    file: tasks/update-finance-transaction.md
    purpose: >
      UPDATE finance_transactions (description, amount, category, status,
      cost_center, etc). Joyce/Larissa op DIÁRIA. has_finance_access
      (owner+financeiro, admin EXCLUDED). Multi-currency: converted_*
      mandatory se currency != native. Parent recurrence guard.
    agent: platform-specialist

  - id: delete-finance-transaction
    file: tasks/delete-finance-transaction.md
    purpose: >
      Hard DELETE finance_transactions single ou bulk (max 50). Reason
      obrigatório. has_finance_access (admin BLOCKED). Tripla "DELETE TX".
      Cascade opt-in para recurrence/installments. SAVEPOINT atomic.
    agent: platform-specialist

  - id: update-commission-level
    file: tasks/update-commission-level.md
    purpose: >
      Atualizar commission_levels params (fixed_bonus, targets, rate, etc).
      has_invoice_access (owner+admin). Tripla "UPDATE LEVEL". Reason
      obrigatório. Affected sellers count + recalc warning. Quarterly review.
    agent: admin-specialist

  - id: update-lead
    file: tasks/update-lead.md
    purpose: >
      UPDATE leads (name/email/phone/status/owner/tags/score/opted_out).
      Comercial/cs/admin/owner. Email+phone validation, status transition
      guards (converted=terminal). PII redaction logs. Opt-out side-effect
      cancela sequences ativas (compliance LGPD/GDPR).
    agent: sales-specialist

  - id: delete-opportunity
    file: tasks/delete-opportunity.md
    purpose: >
      Soft delete opp (deleted_at) reversible 30d, ou hard delete admin/
      owner only. Comercial deleta próprias; admin deleta qualquer.
      Won + invoice = BLOCKED (compliance HMRC). Tripla "DELETE OPP" hard.
    agent: sales-specialist

  - id: update-onboarding-form
    file: tasks/update-onboarding-form.md
    purpose: >
      UPDATE evaluation_forms metadata (name/description/slug/target_customer/
      form_type). NÃO publica. URL change warning se published. Optimistic
      lock via version. cs/marketing/admin/owner.
    agent: content-builder

  - id: manage-form-fields
    file: tasks/manage-form-fields.md
    purpose: >
      CRUD granular de form_fields (add/update/delete/reorder). Type-immutable
      se form tem submissions. Max 50 fields. Reorder atomic. Submissions
      preservation em delete. cs/marketing/admin/owner.
    agent: content-builder

  - id: toggle-campaign-status
    file: tasks/toggle-campaign-status.md
    purpose: >
      Toggle campaign status (active/paused/archived). Sandra op DIÁRIA.
      marketing/admin/owner. Confirmation com counts (LPs ativas + leads
      queue). Status transition validation.
    agent: content-builder

  - id: bulk-delete-leads
    file: tasks/bulk-delete-leads.md
    purpose: >
      Bulk delete leads (cleanup periódico). admin/owner only. Tripla
      "BULK DELETE LEADS". Reason obrigatório. Max 200. FK protection
      (won opps preserved). Opted_out warning compliance.
    agent: sales-specialist

  - id: delete-task
    file: tasks/delete-task.md
    purpose: >
      Hard delete tasks single/bulk (max 50). Authority creator/owner/PM.
      Filter authorized vs unauthorized antes de confirmar. Tripla "DELETE
      TASKS" se batch >5. Surface skipped count.
    agent: platform-specialist

  - id: reschedule-task
    file: tasks/reschedule-task.md
    purpose: >
      UPDATE due_date/scheduled_at com F-08.3 integration (non-creator/
      non-owner → REQUEST_CREATED). Conflict detection com tasks +
      calendar_events. force_conflict opt-in. Audit em task_date_changes.
    agent: platform-specialist

  - id: send-message
    file: tasks/send-message.md
    purpose: >
      INSERT em channel_messages. Operação MAIS frequente do time. Membership
      check, archived BLOCKED. Skip confirmation se < 200 chars sem mentions.
      Activity log selectivo (evita spam). Notification side-effect non-
      blocking. Thread integrity (no nested). F-07.1 PRD.
    agent: platform-specialist

  - id: create-channel
    file: tasks/create-channel.md
    purpose: >
      Criar channel + initial membership atomic. admin/owner only (estrutura
      organizacional). Name kebab-case + uniqueness. Members existem +
      active. F-07.1 PRD.
    agent: platform-specialist

  - id: create-schedule-block
    file: tasks/create-schedule-block.md
    purpose: >
      Criar block na agenda (focus_time/meeting/personal/unavailable/task).
      Self-block default; cross-user requer admin/owner. Conflict detection +
      force_conflict opt-in. Google Calendar sync side-effect non-blocking.
      F-06 + F-08 PRD.
    agent: platform-specialist

  # ── Wave 8 Tier 2+3: 24 tasks completam o backlog (95% → 100% UI coverage) ──

  # Finance ops (setup + bulk)
  - id: bulk-update-transactions
    file: tasks/bulk-update-transactions.md
    purpose: >
      Bulk UPDATE finance_transactions (categoria/status/cost_center).
      has_finance_access (admin EXCLUDED). Tripla "BULK UPDATE TX". Atomic
      SAVEPOINT per-tx. Multi-currency awareness.
    agent: platform-specialist

  - id: update-bank-account
    file: tasks/update-bank-account.md
    purpose: >
      UPDATE finance_bank_accounts (rename/currency/active). Setup-once.
      has_finance_access. Currency change warn (recompute balances).
    agent: platform-specialist

  - id: update-credit-card
    file: tasks/update-credit-card.md
    purpose: >
      UPDATE finance_credit_cards (limit/due_day/accepts_new). due_day 1..31.
      accepts_new=false vs open invoice warn. has_finance_access.
    agent: platform-specialist

  # CRM/CS Tier 2
  - id: update-customer-avatar
    file: tasks/update-customer-avatar.md
    purpose: >
      UPDATE customer rich profile (avatar/segment/health_score/tags/manager).
      cs/admin/owner. Health 1..10. Side-effect Chat AI ingestion. F-05.4.
    agent: platform-specialist

  - id: export-opportunities-csv
    file: tasks/export-opportunities-csv.md
    purpose: >
      Export opportunities → CSV/XLSX com filtros + custom columns. Async
      job, signed URL 24h expiry, count cap 50k. comercial/admin/owner.
    agent: sales-specialist

  # Marketing Tier 2
  - id: create-editorial-post
    file: tasks/create-editorial-post.md
    purpose: >
      Criar post em editorial_calendar (instagram/blog/lp/evento/email).
      marketing/admin/owner. Channel enum, scheduled_for futuro, assignee
      role check, notification side-effect. F-04.6.
    agent: content-builder

  # Landing Pages Tier 2
  - id: list-landing-page-analytics
    file: tasks/list-landing-page-analytics.md
    purpose: >
      Read-only LP analytics: visitors + engagement events + funnel +
      conversion rate + top utm/devices. Custom date range max 1y. F-09.6.
    agent: content-builder

  - id: clone-landing-page
    file: tasks/clone-landing-page.md
    purpose: >
      Deep copy LP com novo slug. Status reset draft. Granular clone flags
      (blocks/html/seo). cloned_from_id audit/lineage. A/B testing + variações.
    agent: content-builder

  # Automation Tier 2
  - id: clone-automation-flow
    file: tasks/clone-automation-flow.md
    purpose: >
      Deep copy automation_flow com novo nome. Status reset draft.
      cloned_from_id audit. Trigger clone opt-in. Safe variant creation.
    agent: automation-specialist

  # Chiamate Tier 2
  - id: backfill-vapi-calls
    file: tasks/backfill-vapi-calls.md
    purpose: >
      Recuperar chamadas Vapi perdidas via API replay. admin/owner only.
      Period max 30d. Dry-run default. Tripla "BACKFILL VAPI". Idempotent
      via UNIQUE vapi_call_id. Incident response.
    agent: integration-specialist

  # Settings Tier 2
  - id: view-activity-log
    file: tasks/view-activity-log.md
    purpose: >
      Read-only consulta activity_logs com filtros (user/action/resource/
      cycle_id). owner-only (compliance). Stats agregadas top
      actions/users/resources. Self-log RECURSIVE. F-16.3.
    agent: platform-specialist

  - id: check-meta-sync-health
    file: tasks/check-meta-sync-health.md
    purpose: >
      Read-only diagnóstico cron meta-sync. Health green/yellow/red per
      account. Cron status + queue depth + last errors. Recommendations
      actionable. marketing/admin/owner.
    agent: integration-specialist

  # Gestão Tier 2
  - id: search-creative-studio
    file: tasks/search-creative-studio.md
    purpose: >
      Read-only busca/filtra creative_assets (banners/videos/templates/
      images). Multi-criteria filter. Signed URLs 24h. marketing/admin.
    agent: content-builder

  - id: create-evento-products
    file: tasks/create-evento-products.md
    purpose: >
      Bridge M-13/M-17. Batch create products evento (early bird/regular/
      VIP) + Stripe Catalog sync. admin/owner via has_invoice_access.
      Tripla "CRIA PRODUCTS". Stripe rollback on failure.
    agent: admin-specialist

  # Communication Tier 2
  - id: edit-message
    file: tasks/edit-message.md
    purpose: >
      Editar channel_message própria. Authority creator only. 24h window
      default. Edit history em channel_message_edits. Optimistic lock.
    agent: platform-specialist

  - id: delete-message
    file: tasks/delete-message.md
    purpose: >
      Soft delete channel_message (is_deleted=true, content limpo).
      Authority creator OR channel_admin OR owner. Reason recomendado se
      non-creator. Thread integrity preservada.
    agent: platform-specialist

  - id: manage-channel-members
    file: tasks/manage-channel-members.md
    purpose: >
      Add/remove members + change role em canal. Authority channel_admin
      OR owner. Last-admin protection, creator não removível. Atomic batch.
    agent: platform-specialist

  # Admin/RBAC Tier 2 (admin-specialist agent já tinha playbook — agora task formal)
  - id: revoke-role
    file: tasks/revoke-role.md
    purpose: >
      DELETE row em user_roles (rebaixa user). Owner-only. Last-owner
      protection (min 1). Self-revoke owner = tripla "REMOVE OWN OWNER".
      Reason obrigatório. Capabilities lost preview. Audit STRICT.
    agent: admin-specialist

  - id: deactivate-user
    file: tasks/deactivate-user.md
    purpose: >
      Mark profile.is_active=false + revoke ALL roles + opcional cascade
      reassign assignments. Owner-only. Last-owner protection. No self-
      deactivate. Tripla "DEACTIVATE USER". Reversível via reactivate-user.
    agent: admin-specialist

  # Tasks Tier 3
  - id: manage-task-projects
    file: tasks/manage-task-projects.md
    purpose: >
      CRUD task_projects + project_members. Authority varies per action
      (creator/admin/owner). Last admin protection, archive ≠ delete.
      F-08.2.
    agent: platform-specialist

  # Goals Tier 3
  - id: manage-monthly-goals
    file: tasks/manage-monthly-goals.md
    purpose: >
      CRUD goals + goal_history (audit). Owner-only para create/update;
      read owner+admin. Period unique per area. F-12.
    agent: admin-specialist

  # Radar Tier 3
  - id: manage-radar-meetings
    file: tasks/manage-radar-meetings.md
    purpose: >
      CRUD radar_meetings + action_plans + linkagem a tasks. admin/owner.
      Setor enum, generate slides via edge opcional. F-14.
    agent: platform-specialist

  # Platform Utils Tier 2/3
  - id: import-csv
    file: tasks/import-csv.md
    purpose: >
      Import CSV unificado (leads/opps/transactions/customers). admin/owner.
      Dry-run default, dedup strategy explicit, async job, tripla "IMPORT
      CSV". Email notification on completion.
    agent: imports-specialist

  - id: diagnose-database
    file: tasks/diagnose-database.md
    purpose: >
      Read-only table introspection (schema/indexes/RLS/row counts).
      Owner-only emergency diagnostics. Max 20 tables/call. Zero PII em
      output (apenas metadata).
    agent: admin-specialist

  - id: request-role-change
    file: tasks/request-role-change.md
    purpose: >
      FR5 (PRD 01-auth) — NÃO-owners pedem ascensão para roles restritas
      (admin/financeiro/owner) via INSERT em role_requests. Owner aprova depois
      via approve-role-request. Pre-checks bloqueiam self-grant e duplicates.
    agent: platform-specialist  # listada em admin-specialist por discoverability mas executor é platform

  - id: approve-role-request
    file: tasks/approve-role-request.md
    purpose: >
      FR5 (PRD 01-auth) — owner aprova/rejeita role_request pendente. Approve
      dispara INSERT user_roles + UPDATE request. Reject só UPDATE request.
      Owner-only gate, dupla confirmation (tripla se requested_role='owner').
      Audit STRICT (falha audit = ABORT) + quality-guardian flag mandatory.
    agent: admin-specialist

