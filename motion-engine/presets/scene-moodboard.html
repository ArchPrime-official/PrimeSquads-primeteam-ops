<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, initial-scale=1" />
<title>Lovarch — Moodboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700&family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --background:#FAF9F7; --foreground:#18181B; --muted-foreground:#57534E;
    --card:#F2F0ED; --muted:#EEEBE7; --border:#E3E3E3; --accent:#A16207;
    --bg-nav:rgba(250,249,247,0.92); --text-dim:#78716C; --text-ghost:#A8A29E;
    --prompt-shadow:0 4px 24px rgba(0,0,0,0.12), 0 0 60px rgba(161,98,7,0.04);
    --shadow-sm:0 1px 2px 0 rgba(0,0,0,0.04); --shadow-lg:0 10px 15px -3px rgba(0,0,0,0.06);
    --card-shadow:0 1px 3px rgba(0,0,0,0.05), 0 8px 24px -8px rgba(0,0,0,0.10);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#1a1a1a}
  .stage{width:1920px;height:1080px;overflow:hidden;position:relative;background:var(--background);color:var(--foreground);font-family:'Inter',sans-serif}

  /* ───────── TOP NAV (reused chrome) ───────── */
  .topnav{position:absolute;top:0;left:0;right:0;height:56px;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:var(--bg-nav);backdrop-filter:blur(24px) saturate(1.3);border-bottom:1px solid var(--border)}
  .nav-logo{height:22px;width:auto;display:block;flex-shrink:0}
  .tabs{display:flex;align-items:center;gap:4px;background:rgba(238,235,231,0.6);border-radius:9999px;padding:4px}
  .tab{display:flex;align-items:center;gap:6px;padding:6px 16px;border-radius:9999px;font-size:14px;font-weight:500;color:var(--muted-foreground);cursor:default;line-height:1}
  .tab svg{width:14px;height:14px}
  .tab.active{background:var(--background);color:var(--foreground);box-shadow:var(--shadow-sm)}
  .nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .icon-btn{width:34px;height:34px;border-radius:9999px;display:flex;align-items:center;justify-content:center;color:var(--muted-foreground)}
  .icon-btn svg{width:16px;height:16px}
  .credits-pill{display:flex;align-items:center;gap:7px;padding:6px 13px 6px 11px;border-radius:9999px;background:rgba(161,98,7,0.10);border:1px solid rgba(161,98,7,0.18);color:var(--accent)}
  .credits-pill svg{width:15px;height:15px}
  .credits-pill .credit-num{font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;letter-spacing:.2px;line-height:1}
  .avatar{width:32px;height:32px;border-radius:9999px;background:linear-gradient(135deg,#2d2d33,#18181B);color:#FAF9F7;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px}

  /* ───────── CONTENT ───────── */
  .content{position:absolute;top:56px;left:0;right:0;bottom:0;padding:26px 40px 0 40px;overflow:hidden}
  .page-head{display:flex;align-items:center;gap:14px;margin-bottom:22px}
  .head-glyph{width:42px;height:42px;border-radius:12px;background:rgba(161,98,7,0.10);display:flex;align-items:center;justify-content:center;color:var(--accent);flex-shrink:0}
  .head-glyph svg{width:21px;height:21px}
  .head-text .h-title{font-family:'Outfit',sans-serif;font-size:21px;font-weight:700;color:var(--foreground);line-height:1.1}
  .head-text .h-sub{font-family:'Inter',sans-serif;font-size:13px;color:var(--text-dim);margin-top:3px}

  /* masonry grid */
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px;align-items:start}
  .mb-card{background:#FFFFFF;border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:var(--card-shadow);opacity:0;transform:translateY(18px);will-change:opacity,transform}
  .mb-img{width:100%;display:block;border-bottom:1px solid rgba(227,227,227,0.6)}
  .mb-body{padding:16px 18px 18px 18px}
  .mb-title{font-family:'Outfit',sans-serif;font-size:17px;font-weight:700;color:var(--foreground);line-height:1.2;letter-spacing:-.2px}
  .mb-date{font-family:'Inter',sans-serif;font-size:13px;color:var(--text-dim);margin-top:5px}
  .mb-palette{display:flex;gap:9px;margin-top:14px}
  .swatch{width:30px;height:30px;border-radius:50%;border:1px solid rgba(0,0,0,0.06);box-shadow:0 1px 2px rgba(0,0,0,0.05)}
  .mb-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .mb-tag{padding:6px 12px;border-radius:9999px;background:var(--muted);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted-foreground);line-height:1}
  .mb-tag.plus{color:var(--text-dim);background:transparent;padding:6px 4px}
  .mb-desc{font-family:'Inter',sans-serif;font-size:13px;color:var(--text-dim);margin-top:14px;line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  /* PROMPT BAR */
  .prompt-dock{position:absolute;left:0;right:0;bottom:24px;display:flex;flex-direction:column;align-items:center;gap:18px;padding:0 40px;z-index:40}
  .prompt-bar{width:1040px;border-radius:24px;background:rgba(255,255,255,0.97);backdrop-filter:blur(24px) saturate(1.3);box-shadow:var(--prompt-shadow);border:1px solid var(--border);padding:18px 22px 16px 24px;opacity:0;transform:translateY(14px);will-change:opacity,transform}
  .pb-input{font-family:'Inter',sans-serif;font-size:16px;color:var(--foreground);line-height:1.4;min-height:24px}
  .pb-input .ph{color:rgba(87,83,78,0.55)}
  .pb-caret{display:inline-block;width:1.5px;height:18px;background:var(--accent);margin-left:1px;vertical-align:-3px;opacity:0}
  .pb-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px}
  .pb-chips{display:flex;align-items:center;gap:10px}
  .pchip{display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:9999px;background:var(--muted);font-size:12.5px;font-weight:500;color:rgba(24,24,27,0.82);line-height:1}
  .pchip svg.lead{width:14px;height:14px;color:var(--muted-foreground)}
  .pchip .chev{width:13px;height:13px;color:var(--text-dim)}
  .pchip.cr{color:var(--accent);background:rgba(161,98,7,0.08);gap:5px}
  .pchip.cr svg{width:13px;height:13px;color:var(--accent)}
  .pb-right{display:flex;align-items:center;gap:12px}
  .pb-mic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--muted-foreground)}
  .pb-mic svg{width:18px;height:18px}
  .pb-send{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;background:rgba(161,98,7,0.18);color:var(--accent)}
  .pb-send svg{width:18px;height:18px}

  /* mode pills */
  .mode-pills{display:flex;align-items:center;gap:12px;opacity:0;transform:translateY(10px);will-change:opacity,transform}
  .mpill{display:flex;align-items:center;gap:8px;padding:9px 18px;border-radius:9999px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;background:#FFFFFF;border:1px solid var(--border);color:var(--muted-foreground);box-shadow:var(--shadow-sm);line-height:1}
  .mpill svg{width:16px;height:16px}
  .mpill.active{background:var(--accent);border-color:var(--accent);color:#FFFFFF;box-shadow:0 4px 14px rgba(161,98,7,0.28)}

  #cursor{position:absolute;left:0;top:0;z-index:80;width:26px;height:26px;transform:translate(0,0);pointer-events:none;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.30));will-change:transform}
</style>
</head>
<body>
<div class="stage">
  <header class="topnav">
    <img class="nav-logo" src="lovarch-logo.png" alt="LOVARCH" />
    <nav class="tabs">
      <div class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.6L20 10l-5.1 1.4L12 17l-1.9-5.6L5 10l5.1-1.4z"/></svg>Home</div>
      <div class="tab active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>Studio</div>
      <div class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-8"/><path d="M21 7v6h-6"/></svg>Business</div>
      <div class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10L12 5 2 10l10 5 10-5z"/><path d="M6 12v5c0 1 2.7 2.5 6 2.5s6-1.5 6-2.5v-5"/></svg>Formazione</div>
    </nav>
    <div class="nav-right">
      <div class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8l6 6"/><path d="M4 14l6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="M22 22l-5-10-5 10"/><path d="M14 18h6"/></svg></div>
      <div class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></div>
      <div class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg></div>
      <div class="credits-pill"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2l2.4 6.9L21 11l-6.6 2.1L12 20l-2.4-6.9L3 11l6.6-2.1z"/></svg><span class="credit-num">99.961</span></div>
      <div class="avatar">A</div>
    </div>
  </header>

  <main class="content">
    <div class="page-head">
      <div class="head-glyph">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l9 5-9 5-9-5 9-5z"/><path d="M3 12l9 5 9-5"/><path d="M3 17l9 5 9-5"/></svg>
      </div>
      <div class="head-text">
        <div class="h-title">I tuoi Moodboard</div>
        <div class="h-sub">4 moodboards</div>
      </div>
    </div>

    <div class="grid" id="grid"></div>
  </main>

  <div class="prompt-dock">
    <div class="prompt-bar" id="prompt-bar">
      <div class="pb-input"><span id="pb-text"></span><span class="pb-caret" id="pb-caret"></span></div>
      <div class="pb-row">
        <div class="pb-chips">
          <div class="pchip"><svg class="lead" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V5h16v2M9 20h6M12 5v15"/></svg>Da Testo<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></div>
          <div class="pchip"><svg class="lead" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 15l8.5-8.5a1.5 1.5 0 0 1 2 2L11 17.5z" fill="currentColor" stroke="none"/><path d="M4 20l5-5"/></svg>Stile<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></div>
          <div class="pchip"><svg class="lead" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21V8l9-5 9 5v13"/><path d="M9 21v-6h6v6"/></svg>Ambiente<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></div>
          <div class="pchip"><svg class="lead" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h6l2 2h10v10H3z"/></svg>Progetto<svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9l6 6 6-6"/></svg></div>
          <div class="pchip cr"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M12 2l2.4 6.9L21 11l-6.6 2.1L12 20l-2.4-6.9L3 11l6.6-2.1z"/></svg>~15</div>
        </div>
        <div class="pb-right">
          <div class="pb-mic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><path d="M12 19v3"/></svg></div>
          <div class="pb-send"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg></div>
        </div>
      </div>
    </div>

    <div class="mode-pills" id="mode-pills">
      <div class="mpill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>Render Studio</div>
      <div class="mpill active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l9 5-9 5-9-5 9-5z"/><path d="M3 12l9 5 9-5"/><path d="M3 17l9 5 9-5"/></svg>Moodboard</div>
      <div class="mpill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.6L20 10l-5.1 1.4L12 17l-1.9-5.6L5 10l5.1-1.4z"/></svg>Branding</div>
    </div>
  </div>

  <svg id="cursor" viewBox="0 0 24 24" fill="none"><path d="M5 3l13 8.5-5.7 1.2-2.5 5.4z" fill="#1B1B1E" stroke="#FAF9F7" stroke-width="1.2" stroke-linejoin="round"/></svg>
</div>

<script>
window.__CONTENT = Object.assign({
  avatar: "https://cuxbydmyahjaplzkthkr.supabase.co/storage/v1/object/public/user-assets/8f46c892-5f97-4927-ae56-cc9383cde38a/avatar.webp",
}, window.__CONTENT || {});
const C = window.__CONTENT;
window.__DURATION = 9000;

/* ── apply avatar ── */
if(C.avatar){const av=document.querySelector('.avatar');av.textContent='';av.style.backgroundImage='url('+C.avatar+')';av.style.backgroundSize='cover';av.style.backgroundPosition='center';}

/* ── neutral/gold stylised "image" gradients (no photos) ── */
const IMG_GRADS = {
  floorplan: "linear-gradient(135deg,#F4F1EC 0%,#EDE7DD 38%,#E3D9C8 65%,#F1ECE3 100%)",
  interiorA: "linear-gradient(150deg,#F6F1E9 0%,#EADFCB 45%,#D9C7A6 78%,#C9B187 100%)",
  interiorB: "linear-gradient(160deg,#F3EEE6 0%,#E6D8BF 42%,#D2BB93 72%,#BFA478 100%)",
};
/* gold/neutral palette swatches (zero blu/verde/teal) */
const PAL1 = ["#C9B79C","#C08A4E","#B89A6F","#CBB59A","#EDE6DA","#A1845C"];
const PAL2 = ["#EDE7CC","#CFC9C0","#9C958A","#8A7B63","#C08A4E","#9B6A2E","#FBFAF6"];
const PAL3 = ["#F4F1EA","#8A7B63","#FBFAF6","#BBA985","#C9C2B6","#D9D3C8","#C0A878"];

const CARDS = [
  {grad:IMG_GRADS.floorplan, imgH:300,
   title:"Moodboard · Attico Brera", date:"29 mag 2026", pal:PAL1,
   tags:["WABI-SABI · NEOCLASSICO CONTEMPORANEO"],
   desc:"Rovere chiaro spazzolato 14mm, Travertino honed warm beige, Seminato veneziano cream-pink (preservato) +3"},
  {grad:IMG_GRADS.interiorA, imgH:434,
   title:"Armonia Contemporanea Naturale", date:"26 feb 2026", pal:PAL2,
   tags:["LUMINOSO","SPAZIOSO","RAFFINATO","NATURALE","+8"],
   desc:"Marmo Venato, Legno Chiaro, Tessuti Organici +3"},
  {grad:IMG_GRADS.interiorB, imgH:434,
   title:"Contemporâneo Minimalista com toques Clássicos", date:"13 feb 2026", pal:PAL3,
   tags:["ACONCHEGANTE","ELEGANTE","SERENO","FUNCIONALE","+8"],
   desc:"Mármore Branco, Madeira Clara, Tecido Aveludado +3"},
];

const gridEl = document.getElementById('grid');
const cardEls = [];
CARDS.forEach((c)=>{
  const card=document.createElement('div'); card.className='mb-card';
  const img=document.createElement('div'); img.className='mb-img';
  img.style.height=c.imgH+'px'; img.style.background=c.grad;
  const body=document.createElement('div'); body.className='mb-body';
  const title=document.createElement('div'); title.className='mb-title'; title.textContent=c.title;
  const date=document.createElement('div'); date.className='mb-date'; date.textContent=c.date;
  const pal=document.createElement('div'); pal.className='mb-palette';
  c.pal.forEach(col=>{const s=document.createElement('span'); s.className='swatch'; s.style.background=col; pal.appendChild(s);});
  const tags=document.createElement('div'); tags.className='mb-tags';
  c.tags.forEach(t=>{const el=document.createElement('span'); el.className='mb-tag'+(t.startsWith('+')?' plus':''); el.textContent=t; tags.appendChild(el);});
  const desc=document.createElement('div'); desc.className='mb-desc'; desc.textContent=c.desc;
  body.append(title,date,pal,tags,desc);
  card.append(img,body);
  gridEl.appendChild(card);
  cardEls.push(card);
});

/* ── animation primitives (pure functions of T) ── */
function clamp01(x){return x<0?0:x>1?1:x;}
function easeOut(x){x=clamp01(x);return 1-Math.pow(1-x,3);}
function easeInOut(x){x=clamp01(x);return x<0.5?2*x*x:1-Math.pow(-2*x+2,2)/2;}
function lerp(a,b,t){return a+(b-a)*t;}

const stage=document.querySelector('.stage');
const cursorEl=document.getElementById('cursor');
const promptBar=document.getElementById('prompt-bar');
const pbText=document.getElementById('pb-text');
const pbCaret=document.getElementById('pb-caret');
const modePills=document.getElementById('mode-pills');

const PROMPT_PLACEHOLDER="Descrivi l'atmosfera che vuoi creare…";

function centerOf(el){const sr=stage.getBoundingClientRect();const r=el.getBoundingClientRect();const sx=sr.width?(1920/sr.width):1;const sy=sr.height?(1080/sr.height):1;return{x:(r.left-sr.left+r.width/2)*sx,y:(r.top-sr.top+r.height/2)*sy};}
function placeCursor(x,y){cursorEl.style.transform=`translate(${x-4}px, ${y-3}px)`;}

function __render(T){
  T=Math.max(0,Math.min(T,window.__DURATION));

  /* prompt bar fades in first */
  const pbP=easeOut(clamp01((T-300)/700));
  promptBar.style.opacity=pbP.toFixed(3);
  promptBar.style.transform=`translateY(${lerp(14,0,pbP)}px)`;

  /* mode pills fade in */
  const mpP=easeOut(clamp01((T-700)/700));
  modePills.style.opacity=mpP.toFixed(3);
  modePills.style.transform=`translateY(${lerp(10,0,mpP)}px)`;

  /* cards stagger fade-in: img, palette, fonts implied by whole card rising */
  const C_START=1100, C_GAP=520, C_DUR=820;
  cardEls.forEach((card,i)=>{
    const p=easeOut(clamp01((T-(C_START+i*C_GAP))/C_DUR));
    card.style.opacity=p.toFixed(3);
    card.style.transform=`translateY(${lerp(18,0,p)}px)`;
  });

  /* prompt placeholder "types" after cards appear */
  const typeStart=3200, typeDur=2400;
  let shown=0;
  if(T>=typeStart){shown=Math.round(clamp01((T-typeStart)/typeDur)*PROMPT_PLACEHOLDER.length);}
  if(T>=typeStart+typeDur)shown=PROMPT_PLACEHOLDER.length;
  if(shown>0){
    pbText.textContent=PROMPT_PLACEHOLDER.slice(0,shown);
    pbText.className='';
  }else{
    pbText.textContent=PROMPT_PLACEHOLDER;
    pbText.className='ph';
  }
  /* caret blink while typing */
  let caretOp=0;
  if(T>=typeStart && T<typeStart+typeDur+400){caretOp=(Math.floor(T/420)%2===0)?1:0.15;}
  pbCaret.style.opacity=(shown>0&&shown<PROMPT_PLACEHOLDER.length || (T>=typeStart&&T<typeStart+500))?caretOp.toFixed(2):'0';

  /* cursor: enters from bottom-right, moves to prompt input, rests */
  const inputC=centerOf(promptBar);
  const tgtX=inputC.x-360, tgtY=inputC.y-22;
  const sX=1880,sY=1040;
  let cx,cy;
  if(T<500){cx=sX;cy=sY;}
  else if(T<1500){const e=easeInOut((T-500)/1000);cx=lerp(sX,tgtX,e);cy=lerp(sY,tgtY,e);}
  else{cx=tgtX;cy=tgtY;}
  placeCursor(cx,cy);
}
window.__render=__render;
function boot(){__render(0);}
if(document.fonts&&document.fonts.ready){document.fonts.ready.then(boot);}
boot();
window.addEventListener('load',boot);
</script>
