<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, initial-scale=1" />
<title>Lovarch — Le Tue Creazioni (Video)</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700&family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --background:#FAF9F7; --foreground:#18181B; --muted-foreground:#57534E;
    --card:#F2F0ED; --muted:#EEEBE7; --border:#E3E3E3; --accent:#A16207;
    --bg-nav:rgba(250,249,247,0.92); --text-dim:#78716C; --text-ghost:#A8A29E;
    --prompt-shadow:0 4px 24px rgba(0,0,0,0.12), 0 0 60px rgba(161,98,7,0.04);
    --shadow-sm:0 1px 2px 0 rgba(0,0,0,0.04); --shadow-lg:0 10px 15px -3px rgba(0,0,0,0.06);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#1a1a1a}
  .stage{width:1920px;height:1080px;overflow:hidden;position:relative;background:var(--background);color:var(--foreground);font-family:'Inter',sans-serif}

  /* ───────── TOP NAV (idêntico ao render-studio-motion) ───────── */
  .topnav{position:absolute;top:0;left:0;right:0;height:56px;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:0 32px;background:var(--bg-nav);backdrop-filter:blur(24px) saturate(1.3);border-bottom:1px solid var(--border)}
  .nav-logo{height:22px;width:auto;display:block;flex-shrink:0}
  .tabs{display:flex;align-items:center;gap:4px;background:rgba(238,235,231,0.6);border-radius:9999px;padding:4px}
  .tab{display:flex;align-items:center;gap:6px;padding:6px 16px;border-radius:9999px;font-size:14px;font-weight:500;color:var(--muted-foreground);cursor:default;line-height:1}
  .tab svg{width:14px;height:14px}
  .tab.active{background:var(--background);color:var(--foreground);box-shadow:var(--shadow-sm)}
  .nav-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .icon-btn{width:34px;height:34px;border-radius:9999px;display:flex;align-items:center;justify-content:center;color:var(--muted-foreground)}
  .icon-btn svg{width:16px;height:16px}
  .credits-pill{display:flex;align-items:center;gap:7px;padding:6px 13px 6px 11px;border-radius:9999px;background:rgba(161,98,7,0.10);border:1px solid rgba(161,98,7,0.18);color:var(--accent)}
  .credits-pill svg{width:16px;height:16px}
  .credits-pill .credit-num{font-family:'DM Sans',sans-serif;font-weight:700;font-size:14px;letter-spacing:.2px;line-height:1}
  .avatar{width:32px;height:32px;border-radius:9999px;background:linear-gradient(135deg,#2d2d33,#18181B);color:#FAF9F7;display:flex;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;font-weight:600;font-size:13px;background-size:cover;background-position:center}

  /* ───────── CONTENT ───────── */
  .content{position:absolute;top:56px;left:0;right:0;bottom:0;display:flex;flex-direction:column;padding:24px 32px 0 32px}
  .gallery-head{display:flex;align-items:center;gap:12px;margin-bottom:18px}
  .gallery-title{font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;color:var(--foreground)}
  .filters{display:flex;gap:6px;margin-left:auto}
  .filter{padding:6px 15px;border-radius:9999px;font-size:13px;font-weight:500;color:var(--muted-foreground);line-height:1}
  .filter.active{background:var(--foreground);color:var(--background)}

  /* masonry-style grid, 6 columns */
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;grid-auto-rows:8px;align-content:start}
  .tile{position:relative;border-radius:12px;overflow:hidden;background:var(--muted);box-shadow:var(--shadow-sm);opacity:0;transform:translateY(14px);will-change:opacity,transform}
  .tile .ph{position:absolute;inset:0}
  /* neutral image placeholders (warm interior-ish gradients) */
  .g1{background:linear-gradient(135deg,#EDE9E3 0%,#DAD3C8 60%,#C9BFB0 100%)}
  .g2{background:linear-gradient(140deg,#E7E4DF 0%,#CFC8BD 55%,#B7AC9B 100%)}
  .g3{background:linear-gradient(150deg,#E2DED7 0%,#C8C0B2 50%,#A89C88 100%)}
  .g4{background:linear-gradient(135deg,#EFECE6 0%,#D8D2C8 50%,#BFB6A6 100%)}
  .g5{background:linear-gradient(160deg,#E9E5DE 0%,#D2CABC 55%,#B0A491 100%)}
  .g6{background:linear-gradient(130deg,#E5E1D9 0%,#CDC4B5 50%,#ADA088 100%)}
  /* a couple of cooler/teal accents like in GT */
  .gteal{background:linear-gradient(150deg,#D7DDDA 0%,#9FB3AE 55%,#6E8A84 100%)}
  .gdark{background:linear-gradient(160deg,#3A3733 0%,#26241F 60%,#171511 100%)}

  /* video play overlay + badge */
  .tile.video .playcore{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,0.30);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,0.5)}
  .tile.video .playcore svg{width:18px;height:18px;color:#fff;margin-left:2px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}
  .tile.video.dark .playcore{background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.35)}
  .vbadge{position:absolute;top:8px;right:8px;display:flex;align-items:center;gap:5px;padding:3px 9px 3px 8px;border-radius:8px;background:rgba(20,18,16,0.62);backdrop-filter:blur(6px);color:#fff;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;line-height:1;letter-spacing:.2px}
  .vbadge svg{width:10px;height:10px;margin-top:0}
  .dur{position:absolute;left:8px;bottom:8px;padding:2px 7px;border-radius:6px;background:rgba(20,18,16,0.55);backdrop-filter:blur(4px);color:#fff;font-family:'DM Sans',sans-serif;font-size:10.5px;font-weight:600;line-height:1;letter-spacing:.3px}
  /* pulsing play accent for the hero video tile */
  #pulse-play{transform-origin:center;will-change:transform,opacity}

  /* ───────── PROMPT BAR (gallery / "Come posso aiutarti oggi?") ───────── */
  .prompt-dock{position:absolute;left:0;right:0;bottom:18px;display:flex;flex-direction:column;align-items:center;gap:14px;padding:0 40px}
  .prompt-bar{width:760px;min-height:92px;border-radius:24px;background:rgba(255,255,255,0.97);backdrop-filter:blur(24px) saturate(1.3);box-shadow:var(--prompt-shadow);border:1px solid var(--border);position:relative;padding:20px 22px 16px 24px;display:flex}
  #prompt-input{flex:1;border:0;outline:0;background:transparent;resize:none;font-family:'Inter',sans-serif;font-size:18px;color:var(--foreground);line-height:1.5;min-height:30px;overflow:hidden}
  #prompt-input::placeholder{color:rgba(87,83,78,0.50)}
  .pb-right{position:absolute;right:18px;bottom:16px;display:flex;align-items:center;gap:12px}
  .mic{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--muted-foreground)}
  .mic svg{width:19px;height:19px}
  #send-btn{position:relative;width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:rgba(201,153,92,0.30);color:rgba(120,85,40,0.75);box-shadow:0 2px 8px rgba(161,98,7,0.12)}
  #send-btn svg{width:20px;height:20px}

  /* mode chips below the bar */
  .mode-chips{display:flex;align-items:center;gap:12px}
  .mchip{display:flex;align-items:center;gap:9px;padding:9px 18px;border-radius:9999px;background:#fff;border:1px solid var(--border);box-shadow:var(--shadow-sm);font-family:'Inter',sans-serif;font-size:14px;font-weight:500;color:var(--foreground);line-height:1;opacity:0;transform:translateY(8px);will-change:opacity,transform}
  .mchip svg{width:16px;height:16px;color:var(--muted-foreground)}

  #cursor{position:absolute;left:0;top:0;z-index:80;width:26px;height:26px;transform:translate(0,0);pointer-events:none;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.30));will-change:transform}
</style>
</head>
<body>
<div class="stage">
  <header class="topnav">
    <img class="nav-logo" src="lovarch-logo.png" alt="LOVARCH" />
    <nav class="tabs">
      <div class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.6L20 10l-5.1 1.4L12 17l-1.9-5.6L5 10l5.1-1.4z"/></svg>Home</div>
      <div class="tab active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-5-5L5 21"/></svg>Studio</div>
      <div class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l6-6 4 4 8-8"/><path d="M21 7v6h-6"/></svg>Business</div>
      <div class="tab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10L12 5 2 10l10 5 10-5z"/><path d="M6 12v5c0 1 2.7 2.5 6 2.5s6-1.5 6-2.5v-5"/></svg>Formazione</div>
    </nav>
    <div class="nav-right">
      <div class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 8l6 6"/><path d="M4 14l6-6 2-3"/><path d="M2 5h12"/><path d="M7 2h1"/><path d="M22 22l-5-10-5 10"/><path d="M14 18h6"/></svg></div>
      <div class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg></div>
      <div class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg></div>
      <div class="credits-pill"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="6" width="20" height="13" rx="2.5"/><path d="M2 11h20"/></svg><span class="credit-num">99.961</span></div>
      <div class="avatar" id="avatar"></div>
    </div>
  </header>

  <main class="content">
    <div class="gallery-head">
      <div class="gallery-title">Le Tue Creazioni</div>
      <div class="filters">
        <div class="filter active">Tutti</div>
        <div class="filter">Immagini</div>
        <div class="filter">Video</div>
        <div class="filter">Per Progetto</div>
      </div>
    </div>
    <div class="grid" id="grid"></div>
  </main>

  <div class="prompt-dock">
    <div class="prompt-bar">
      <textarea id="prompt-input" rows="1" placeholder="Come posso aiutarti oggi?"></textarea>
      <div class="pb-right">
        <div class="mic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><path d="M12 19v3"/></svg></div>
        <div id="send-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4z"/></svg></div>
      </div>
    </div>
    <div class="mode-chips">
      <div class="mchip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.6"/><path d="M21 15l-5-5L5 21"/></svg>Render Studio</div>
      <div class="mchip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l9 5-9 5-9-5 9-5z"/><path d="M3 12l9 5 9-5"/><path d="M3 17l9 5 9-5"/></svg>Moodboard</div>
      <div class="mchip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 0 0 0 20c1.1 0 2-.9 2-2 0-.5-.2-.9-.5-1.3-.3-.3-.5-.8-.5-1.2 0-1.1.9-2 2-2h2.3A4.4 4.4 0 0 0 22 11c0-5-4.5-9-10-9z"/><circle cx="7.5" cy="10.5" r="1.2" fill="currentColor"/><circle cx="12" cy="7.5" r="1.2" fill="currentColor"/><circle cx="16.5" cy="10.5" r="1.2" fill="currentColor"/></svg>Branding</div>
    </div>
  </div>

  <svg id="cursor" viewBox="0 0 24 24" fill="none"><path d="M5 3l13 8.5-5.7 1.2-2.5 5.4z" fill="#1B1B1E" stroke="#FAF9F7" stroke-width="1.2" stroke-linejoin="round"/></svg>
</div>

<script>
window.__CONTENT = Object.assign({
  avatar: "https://cuxbydmyahjaplzkthkr.supabase.co/storage/v1/object/public/user-assets/8f46c892-5f97-4927-ae56-cc9383cde38a/avatar.webp",
}, window.__CONTENT || {});
const C = window.__CONTENT;

window.__DURATION = 9000;
function clamp01(x){return x<0?0:x>1?1:x;}
function easeOut(x){x=clamp01(x);return 1-Math.pow(1-x,3);}
function smoothstep(e0,e1,x){const t=clamp01((x-e0)/(e1-e0));return t*t*(3-2*t);}
function lerp(a,b,t){return a+(b-a)*t;}

/* avatar persona */
if(C.avatar){const av=document.getElementById('avatar');av.textContent='';av.style.backgroundImage='url('+C.avatar+')';}

/* ── build masonry grid (6 cols, mixed image + video tiles) ──
   span = number of grid-auto-rows (8px) the tile occupies.
   A few tiles are videos with a ▷ badge + duration. */
const PLAY = '<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M7 4.5v15l13-7.5z"/></svg>';
const PLAYW = '<svg viewBox="0 0 24 24" fill="#fff" stroke="none"><path d="M7 4.5v15l13-7.5z"/></svg>';
const VBADGE = '<span class="vbadge"><svg viewBox="0 0 24 24" fill="#fff" stroke="none"><path d="M7 4.5v15l13-7.5z"/></svg>Video</span>';

// masonry tiles. span = rows of grid-auto-rows(8px). cspan = column span.
// video tiles get {v:true, dur:'…', hero?, dark?}. Rows kept short so all 4 fit.
const HERO_IDX = 21; // index of the landscape "Video" hero tile (for cursor target)
const TILES = [
  // row 1 — 6 equal-ish tiles ~128px
  {g:'g1',s:16},{g:'g2',s:16},{g:'g3',s:16},{g:'g4',s:16},{g:'g2',s:16},{g:'g5',s:16},
  // row 2 ~128px
  {g:'g3',s:16},{g:'g6',s:16},{g:'g1',s:16},{g:'g4',s:16},{g:'g5',s:16},{g:'g2',s:16},
  // row 3 ~128px
  {g:'g6',s:16},{g:'g1',s:16},{g:'g3',s:16},{g:'g4',s:16},{g:'g5',s:16},{g:'g2',s:16},
  // row 4 — landscape + VIDEO tiles. portrait video is taller.
  {g:'gteal',s:16},{g:'g1',s:16},
  {g:'g4',cspan:2,s:16},
  {g:'g3',cspan:1,s:16,v:true,dur:'0:06',hero:true},
  {g:'gdark',cspan:1,s:20,v:true,dur:'0:09',dark:true},
];

const grid=document.getElementById('grid');
const tileEls=[];
TILES.forEach((t,i)=>{
  const el=document.createElement('div');
  el.className='tile'+(t.v?' video':'')+(t.dark?' dark':'');
  el.style.gridRow='span '+t.s;
  if(t.cspan)el.style.gridColumn='span '+t.cspan;
  let inner='<div class="ph '+t.g+'"></div>';
  if(t.v){
    const core = t.hero
      ? '<div class="playcore"><svg id="pulse-play" viewBox="0 0 24 24" fill="#fff" stroke="none"><path d="M7 4.5v15l13-7.5z"/></svg></div>'
      : '<div class="playcore">'+PLAYW+'</div>';
    inner += core + VBADGE + '<span class="dur">'+t.dur+'</span>';
  }
  el.innerHTML=inner;
  grid.appendChild(el);
  tileEls.push(el);
});

const stage=document.querySelector('.stage');
const cursorEl=document.getElementById('cursor');
const promptInput=document.getElementById('prompt-input');
const chipEls=[...document.querySelectorAll('.mchip')];
const pulsePlay=document.getElementById('pulse-play');

function centerOf(el){const sr=stage.getBoundingClientRect();const r=el.getBoundingClientRect();const sx=sr.width?(1920/sr.width):1;const sy=sr.height?(1080/sr.height):1;return{x:(r.left-sr.left+r.width/2)*sx,y:(r.top-sr.top+r.height/2)*sy};}
function placeCursor(x,y){cursorEl.style.transform=`translate(${x-4}px, ${y-3}px)`;}

function __render(T){
  T=Math.max(0,Math.min(T,window.__DURATION));

  /* tiles: staggered fade-in (first 0..4800ms across all tiles) */
  const N=tileEls.length;
  for(let i=0;i<N;i++){
    const start=200+i*150;
    const e=easeOut(clamp01((T-start)/620));
    tileEls[i].style.opacity=e.toFixed(3);
    tileEls[i].style.transform=`translateY(${(1-e)*14}px)`;
  }

  /* mode chips fade-in after grid mostly in */
  chipEls.forEach((c,i)=>{
    const start=3600+i*180;
    const e=easeOut(clamp01((T-start)/520));
    c.style.opacity=e.toFixed(3);
    c.style.transform=`translateY(${(1-e)*8}px)`;
  });

  /* subtle pulse on the hero video play icon (whole loop) */
  if(pulsePlay){
    const pulse=0.5+0.5*Math.sin((T/9000)*Math.PI*6); // a few gentle pulses
    const sc=lerp(0.92,1.12,pulse);
    pulsePlay.style.transform=`scale(${sc.toFixed(3)})`;
    pulsePlay.style.opacity=lerp(0.82,1,pulse).toFixed(3);
  }

  /* cursor: drifts in from bottom-right toward the hero video tile, then idles */
  const sX=1880,sY=1050;
  const target = centerOf(tileEls[21]); // hero video tile center
  let cx,cy;
  if(T<500){cx=sX;cy=sY;}
  else if(T<2400){const e=easeOut((T-500)/1900);cx=lerp(sX,target.x,e);cy=lerp(sY,target.y,e);}
  else {cx=target.x;cy=target.y;}
  placeCursor(cx,cy);

  promptInput.value='';
}
window.__render=__render;
function boot(){__render(0);}
if(document.fonts&&document.fonts.ready){document.fonts.ready.then(boot);}
boot();
window.addEventListener('load',boot);
</script>
</body>
</html>
