# Workflow: Creative Studio → Primeteam Ops Publish (CROSS-SQUAD)
# Master orchestrator: @ops-chief
# Sub-squads involved: creative-studio (creative-chief) + primeteam-ops (content-builder)
#
# Use case: Sandra pede "criar carosello sobre X" — workflow gera o asset via
# creative-studio (8h pipeline Hormozi+Playbook) e publica na plataforma PrimeTeam
# (upload Storage + INSERT row + activity_log unified).

name: creative-to-publish
version: 1.0.0
type: cross_squad_workflow
master_orchestrator: "@ops-chief"
sub_squads_involved:
  - creative-studio (creative-chief)
  - primeteam-ops (content-builder)

description: >
  Pipeline cross-squad end-to-end: generate creative asset via creative-studio
  + publish na plataforma PrimeTeam via primeteam-ops content-builder.
  Cycle ID único atravessa as 2 squads. Activity log unified com cross_squad=true.

trigger: "*publish-creative {tipo} {brief}"  # via @ops-chief
estimated_duration: "8-10h (creative 6-8h + publish 1-2h)"

# ════════════════════════════════════════════════════════════════════
# CROSS-SQUAD HANDOFF PROTOCOL
# ════════════════════════════════════════════════════════════════════
handoff_protocol:
  cycle_id_strategy: "Generated by @ops-chief at phase 1, propagated through ALL phases"
  activity_log_strategy: "parent_squad='primeteam-ops' + sub_squad=<varies> + cycle_id=<UUID> + cross_squad=true"
  return_path: "creative-chief → ops-chief (validate) → content-builder → ops-chief (close cycle)"

# ════════════════════════════════════════════════════════════════════
# PHASES
# ════════════════════════════════════════════════════════════════════

phases:
  # ─────────────────────────────────────────────────────────────────
  - id: phase_1_triage
    name: "Triage + Cycle ID generation"
    agent: "@ops-chief"
    squad: "primeteam-ops"
    duration: "5 min"
    description: >
      Receber demand, identificar tipo creative (carosello/video/immagine/marketing-studio),
      gerar Cycle ID único, validar role do user (marketing/admin/owner).
    inputs:
      - user_brief (string em italiano ou pt)
      - user_jwt
      - user_role
    actions:
      - "Validate role: marketing/admin/owner. Else BLOCKED."
      - "Identify creative_type from brief keywords."
      - "Generate Cycle ID (UUID v4)."
      - "Activity log: action='ops-chief.start_creative_cycle', cycle_id=<UUID>, parent_squad='primeteam-ops', cross_squad=true."
    outputs:
      - cycle_id
      - creative_type
      - validated_role
    quality_gate: QG-OPS-001
    veto:
      - "Role insuficiente → BLOCKED"
      - "Brief sem creative_type identificável → ESCALATE para clarification"

  # ─────────────────────────────────────────────────────────────────
  - id: phase_2_handoff_to_creative
    name: "Cross-squad handoff: ops-chief → creative-chief"
    agent: "@ops-chief"
    squad: "primeteam-ops"
    target_squad: "creative-studio"
    target_agent: "@creative-chief"
    duration: "10 min"
    description: >
      Emit handoff card V18 com Cycle ID + brief enriquecido. Invoke
      /creativeStudio:agents:creative-chief com payload completo. Aguarda return.
    inputs:
      - cycle_id (from phase 1)
      - user_brief
      - creative_type
    actions:
      - "Enrich brief: consultar Supabase tabela avatars (avatar ativo)."
      - "Build handoff card V18: { cycle_id, brief, avatar_data, creative_type, target_platform, deadline }."
      - "Invoke /creativeStudio:agents:creative-chief com payload."
      - "Echo to user: 'Iniciando creative-studio pipeline. ETA 6-8h.'"
      - "Activity log: action='ops-chief.handoff_to_creative_chief', sub_squad='creative-studio'."
    outputs:
      - handoff_card_id
      - creative_chief_invoked (bool)
    quality_gate: QG-OPS-002
    veto:
      - "Avatar não encontrado → ESCALATE para @content-strategist primeiro"

  # ─────────────────────────────────────────────────────────────────
  - id: phase_3_creative_generation
    name: "Creative generation (creative-studio internal)"
    agent: "@creative-chief"
    squad: "creative-studio"
    duration: "6-8h (depends on type)"
    description: >
      Sub-chief @creative-chief executa workflow apropriado do creative-studio
      (wf-carousel-archprime / wf-brief-to-creative / wf-single-image / wf-marketing-studio).
      Pipeline interno do creative-studio: 6-8 fases com 14 specialists.
    inputs:
      - cycle_id
      - handoff_card_payload
    actions:
      - "Identify workflow: carosello → wf-carousel-archprime, video → wf-brief-to-creative, etc."
      - "Execute internal workflow (avatar → leva → headline → estrutura → prompts → geração → QC)."
      - "Validate output via *safety-audit (SA_001..SA_011)."
      - "Activity log per phase: parent_squad='primeteam-ops' + sub_squad='creative-studio' + cycle_id."
    outputs:
      - asset_files (paths em outputs/{slug}/)
      - metadata (type, slug, palette, duration, total_cost)
      - qc_verdict (PASS/CONCERNS/FAIL)
      - safety_audit_results
    quality_gate: QG-CR-005
    veto:
      - "qc_verdict=FAIL → return to internal phase apropriada (regenerate)"
      - "safety_audit fail em SA_001..SA_010 → BLOCK publish"

  # ─────────────────────────────────────────────────────────────────
  - id: phase_4_return_to_ops
    name: "Return to @ops-chief: handoff card + assets"
    agent: "@creative-chief"
    squad: "creative-studio"
    target_agent: "@ops-chief"
    duration: "5 min"
    description: >
      Sub-chief retorna ao master orchestrator com Cycle ID + asset_files +
      metadata + qc_verdict. ops-chief valida e decide próximo passo.
    inputs:
      - cycle_id
      - asset_files
      - metadata
      - qc_verdict
    actions:
      - "Build return handoff card V18: { cycle_id, asset_files[], metadata, qc_verdict, total_cost }."
      - "Return control to /PrimeteamOps:agents:ops-chief."
      - "Activity log: action='creative-chief.return_to_ops', sub_squad='creative-studio'."
    outputs:
      - return_handoff_card_id
      - control_returned (bool)

  # ─────────────────────────────────────────────────────────────────
  - id: phase_5_ops_validation
    name: "ops-chief valida return + decide publish"
    agent: "@ops-chief"
    squad: "primeteam-ops"
    duration: "5 min"
    description: >
      Master orchestrator valida que creative-chief retornou output válido.
      Se qc_verdict=PASS, route a content-builder para publish. Se CONCERNS,
      pergunta ao user. Se FAIL, abort cycle ou re-iterate.
    inputs:
      - return_handoff_card
      - qc_verdict
    actions:
      - "Validate handoff card structure (Cycle ID match, asset_files presents, metadata complete)."
      - "If qc_verdict=PASS: proceed to phase 6."
      - "If qc_verdict=CONCERNS: echo findings ao user, pergunta 'publish anyway?'."
      - "If qc_verdict=FAIL: report findings, decide com user (abort vs re-iterate)."
    outputs:
      - publish_decision (PROCEED/USER_DECIDES/ABORT)
    quality_gate: QG-OPS-003

  # ─────────────────────────────────────────────────────────────────
  - id: phase_6_handoff_to_content_builder
    name: "ops-chief → content-builder (publish)"
    agent: "@ops-chief"
    squad: "primeteam-ops"
    target_agent: "@content-builder"
    duration: "5 min"
    description: >
      ops-chief delega publish ao content-builder (specialist interno do primeteam-ops).
      Não é cross-squad (mesmo squad), é routing interno.
    inputs:
      - cycle_id
      - asset_files
      - metadata
      - publish_decision (must be PROCEED)
    actions:
      - "Build internal handoff (não V18 cross-squad, é internal)."
      - "Invoke @content-builder com payload."
    outputs:
      - content_builder_invoked (bool)

  # ─────────────────────────────────────────────────────────────────
  - id: phase_7_publish_to_platform
    name: "Publish na plataforma PrimeTeam"
    agent: "@content-builder"
    squad: "primeteam-ops"
    duration: "30-60 min"
    description: >
      Content-builder executa upload Storage + INSERT row apropriada na tabela
      (content_items para imagem singola, ugc_videos para video, landing_pages
      para carosello como template Instagram, etc.).
    inputs:
      - cycle_id
      - asset_files
      - metadata
    actions:
      - "Determine target table based on metadata.type:"
      - "  - carosello → INSERT em content_items (type='carousel') + upload 10 slides Storage"
      - "  - video → INSERT em ugc_videos + upload .mp4 Storage"
      - "  - immagine → INSERT em content_items (type='image') + upload Storage"
      - "  - marketing_studio → INSERT em content_items (type='ad_creative') + upload Storage"
      - "Use signed URLs (24h validity) ou public URLs based on visibility."
      - "Update creative_usage table com cost from creative-studio metadata."
      - "Activity log: action='content-builder.publish_creative', sub_squad=null (internal), cycle_id, cross_squad=true."
    outputs:
      - published_id (uuid da row criada)
      - published_url (public ou signed)
      - storage_path
    quality_gate: QG-OPS-004
    veto:
      - "Slug collision em landing_pages → ESCALATE para user"
      - "Storage upload fail → retry 2x → ESCALATE"

  # ─────────────────────────────────────────────────────────────────
  - id: phase_8_close_cycle
    name: "ops-chief fecha ciclo + report ao user"
    agent: "@ops-chief"
    squad: "primeteam-ops"
    duration: "5 min"
    description: >
      Master orchestrator finaliza: report ao user com URL pública + IDs +
      total cost + activity log link. Cycle ID closed.
    inputs:
      - cycle_id
      - published_id
      - published_url
      - total_cost (creative + publish)
    actions:
      - "Echo ao user:"
      - "  ✓ Carosello publicado!"
      - "  Asset ID: {published_id}"
      - "  URL: {published_url}"
      - "  Custo total: ${total_cost} (creative-studio + publish)"
      - "  Cycle ID: {cycle_id}"
      - "  Activity: /gestao/AtividadeLog?cycle={cycle_id}"
      - "Activity log final: action='ops-chief.close_creative_cycle', cycle_id."
      - "Mark cycle as DONE em activity_logs (status update)."
    outputs:
      - cycle_status (DONE)
      - user_report

# ════════════════════════════════════════════════════════════════════
# QUALITY GATES (cross-squad coverage)
# ════════════════════════════════════════════════════════════════════
quality_gates:
  - id: QG-OPS-001
    phase: 1 (triage)
    blocks_on: [role_check_fail, brief_unclear]

  - id: QG-OPS-002
    phase: 2 (handoff_to_creative)
    blocks_on: [avatar_not_found, payload_incomplete]

  - id: QG-CR-005
    phase: 3 (creative_generation)
    blocks_on: [qc_verdict=FAIL, safety_audit_fail]
    delegated_to: creative-chief

  - id: QG-OPS-003
    phase: 5 (ops_validation)
    blocks_on: [handoff_card_invalid, asset_files_missing]

  - id: QG-OPS-004
    phase: 7 (publish)
    blocks_on: [slug_collision, storage_upload_fail, db_insert_fail]

# ════════════════════════════════════════════════════════════════════
# ACTIVITY LOG STRATEGY (unified end-to-end visibility)
# ════════════════════════════════════════════════════════════════════
activity_log:
  cycle_id_propagation: "Generated phase 1, used in ALL 8 phases"
  parent_squad: "primeteam-ops" (sempre)
  sub_squad: varies (null para ops-internal, 'creative-studio' para creative phases)
  cross_squad: true (sempre — workflow é cross-squad por definição)

  expected_log_entries:
    - phase_1: "ops-chief.start_creative_cycle"
    - phase_2: "ops-chief.handoff_to_creative_chief"
    - phase_3: "creative-chief.execute_workflow + ~15-20 internal phase logs"
    - phase_4: "creative-chief.return_to_ops"
    - phase_5: "ops-chief.validate_creative_return"
    - phase_6: "ops-chief.delegate_to_content_builder"
    - phase_7: "content-builder.publish_creative"
    - phase_8: "ops-chief.close_creative_cycle"

  user_visibility: "Dashboard /gestao/AtividadeLog filtrado por cycle_id mostra timeline unified end-to-end"

# ════════════════════════════════════════════════════════════════════
# NON NEGOZIABILE
# ════════════════════════════════════════════════════════════════════
non_negoziabile:
  - "Cycle ID único atravessa TODAS as 8 fases (visibility end-to-end)"
  - "@creative-chief NUNCA delega direct para content-builder (must return to @ops-chief primeiro)"
  - "Activity log unified com parent_squad='primeteam-ops' SEMPRE"
  - "Role check (marketing/admin/owner) em phase 1 — non-negoziabile"
  - "Safety audit (SA_001..SA_011) em creative-studio phase 3 — block publish se fail"
  - "Slug collision check em phase 7 — block publish se collision (slug é PUBLIC URL)"
  - "User report final SEMPRE inclui cycle_id (para auditoria)"
