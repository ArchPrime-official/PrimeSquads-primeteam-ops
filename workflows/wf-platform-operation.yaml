# ═══════════════════════════════════════════════════════════════════════════════
# NOTES
# ═══════════════════════════════════════════════════════════════════════════════
notes:
  why_this_workflow_exists: |
    Before Sprint 5, the cycle flow was implicit in the ops-chief persona
    YAML. This worked but made it hard for: (a) colaboradores entenderem
    o flow sem ler um agent inteiro, (b) testes automatizados (test-handoff-flow.md
    pressupunha o flow mas não tinha source canônico), (c) auditoria de
    quality-guardian (ele precisa saber ONDE intervir). Este YAML é a
    formalização que suporta esses 3 casos.

  what_this_is_not: |
    - NÃO é um workflow "elicitation-heavy" (não tem elicit:true, não
      pergunta 15 coisas ao user). É o flow que acontece toda vez que
      ops-chief é ativado, formalizado.
    - NÃO é um script executável (Python/Node). É documentação que os
      agents obedecem por design de persona.
    - NÃO substitui o `Orchestration Protocol 5-step` do ops-chief —
      complementa, dando visão top-down.

  future_evolution: |
    Sprint 6+: workflow pode ganhar sub-workflows para operações
    específicas (ex: wf-lead-to-sale, wf-finance-reconciliation). Este
    wf-platform-operation fica como o "generic cycle" dentro do qual
    sub-workflows rodam.
